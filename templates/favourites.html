<!DOCTYPE html>
<html>
<head>
    <title>Favourite Colleges</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f172a;
            color:white;
            padding:30px;
        }

        .card{
            background:#334155;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
        }
        .card h4{
               color:white;
            }
    </style>
</head>

<body>

<h1 class="mb-4">❤️ Favourite Colleges</h1>

<div class="row" id="favContainer"></div>

<a href="/" class="btn btn-info mt-3">⬅ Back</a>

<script>
    let favourites = JSON.parse(localStorage.getItem("favourites")) || [];

    let container = document.getElementById("favContainer");

    favourites.forEach(college => {

        container.innerHTML += `
            <div class="col-md-4">
                <div class="card text-white">
                    <h4>${college}</h4>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
