<!DOCTYPE html>
<html>
<head>
    <title>KCET College Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        .main-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-top: 60px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #dcdcdc;
        }

        .form-control,
        .form-select {
            height: 50px;
            border-radius: 10px;
        }

        .btn-custom {
            width: 100%;
            height: 50px;
            border-radius: 10px;
            background: #00c6ff;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0072ff;
            transform: scale(1.02);
        }

        .feature-box {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .feature-box h5 {
            margin-top: 10px;
        }
    </style>
</head>
<body style="background: linear-gradient(to right, #141e30, #243b55); color:white;">

<div class="container mt-5 p-4 rounded shadow-lg" style="background-color: rgba(0,0,0,0.5);">

    <div class="main-box col-md-6 mx-auto">

        <div class="title">🎓 KCET College Predictor</div>

        <div class="subtitle">
            Predict colleges and branches using real cutoff data
        </div>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Enter Rank</label>
                <input type="number" name="rank" class="form-control" placeholder="Enter your KCET rank" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Category</label>
                <select name="category" class="form-select" required>
                    <option value="GM">GM</option>
                    <option value="1G">1G</option>
                    <option value="1R">1R</option>
                    <option value="2AG">2AG</option>
                    <option value="2AK">2AK</option>
                    <option value="2AR">2AR</option>

                    <option value="2BG">2BG</option>
                    <option value="2BK">2BK</option>
                    <option value="2BR">2BR</option>

                    <option value="3AG">3AG</option>
                    <option value="3AK">3AK</option>
                    <option value="3AR">3AR</option>

                    <option value="3BG">3BG</option>
                    <option value="3BK">3BK</option>
                    <option value="3BR">3BR</option>

                    <option value="SCG">SCG</option>
                    <option value="SCK">SCK</option>
                    <option value="SCR">SCR</option>

                    <option value="STG">STG</option>
                    <option value="STK">STK</option>
                    <option value="STR">STR</option>
                </select>
                <div class="mb-3">
                <label class="form-label">Select Branch</label>
                <select name="branch" class="form-select">
                <option value="">All Branches</option>
                <option value="CSE">CSE</option>
                <option value="CSE AIML">CSE AIML</option>
                <option value="ECE">ECE</option>
                <option value="ISE">ISE</option>
                </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Select Exam</label>
                <select name="exam" class="form-select">
                    <option value="KCET">KCET</option>
                    <option value="JEE">JEE</option>
                </select>
            </div>

            <button type="submit" class="btn btn-custom">
                Predict Colleges 🚀
            </button>

        </form>
    </div>


    <div class="row mt-4 mb-5">

        <div class="col-md-4">
            <div class="feature-box">
                <h2>📊</h2>
                <h5>Real Data</h5>
                <p>Uses real KCET cutoff dataset.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="feature-box">
                <h2>⚡</h2>
                <h5>Fast Prediction</h5>
                <p>Get college prediction instantly.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="feature-box">
                <h2>🎯</h2>
                <h5>Smart Results</h5>
                <p>Shows branches based on your rank.</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
